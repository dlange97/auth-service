security:
  password_hashers:
    Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: auto

  providers:
    app_user_provider:
      entity:
        class: App\Entity\User
        property: email

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    health:
      pattern: ^/auth/health$
      security: false

    logout:
      pattern: ^/auth/logout$
      security: false

    checkout:
      pattern: ^/auth/checkout/
      security: false

    instance_resolve:
      pattern: ^/auth/instances/resolve$
      security: false

    login:
      pattern: ^/auth/login$
      stateless: true
      user_checker: App\Security\UserChecker
      json_login:
        check_path: auth_login
        username_path: email
        password_path: password
        success_handler: lexik_jwt_authentication.handler.authentication_success
        failure_handler: lexik_jwt_authentication.handler.authentication_failure

    api:
      pattern: ^/auth/
      stateless: true
      provider: app_user_provider
      user_checker: App\Security\UserChecker
      jwt: ~
      entry_point: jwt

  access_control:
    - { path: ^/auth/health, roles: PUBLIC_ACCESS }
    - { path: ^/auth/docs(?:\.json)?$, roles: ROLE_ADMIN }
    - { path: ^/auth/admin/security-log, roles: ROLE_ADMIN }
    - { path: ^/auth/login, roles: PUBLIC_ACCESS }
    - { path: ^/auth/logout, roles: PUBLIC_ACCESS }
    - { path: ^/auth/request-access, roles: PUBLIC_ACCESS }
    - { path: ^/auth/checkout, roles: PUBLIC_ACCESS }
    - { path: ^/auth/instances/resolve, roles: PUBLIC_ACCESS }
    - { path: ^/auth/, roles: ROLE_USER }

when@prod:
  security:
    access_control:
      - { path: ^/, requires_channel: https }
