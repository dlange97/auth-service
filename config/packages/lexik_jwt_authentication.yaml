lexik_jwt_authentication:
  secret_key: "%env(resolve:JWT_SECRET_KEY)%"
  public_key: "%env(resolve:JWT_PUBLIC_KEY)%"
  pass_phrase: "%env(JWT_PASSPHRASE)%"
  token_ttl: "%env(int:JWT_TOKEN_TTL)%"
  user_id_claim: email
  # Keep the token in the JSON response body so mobile / API clients can still read it.
  remove_token_from_body_when_cookies_used: false
  # Set an httpOnly cookie on every successful login response.
  set_cookies:
    jwt_token:
      lifetime: null # inherits token_ttl
      samesite: lax
      path: /
      domain: null
      secure: false # set to true in production (HTTPS)
      httpOnly: true
  # Extract the JWT from the cookie on every authenticated request.
  token_extractors:
    authorization_header:
      enabled: true
      prefix: Bearer
      name: Authorization
    cookie:
      enabled: true
      name: jwt_token
