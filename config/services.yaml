services:
  _defaults:
    autowire: true
    autoconfigure: true

  App\:
    resource: "../src/"
    exclude:
      - "../src/DependencyInjection/"
      - "../src/Entity/"
      - "../src/Kernel.php"

  # ── JWT enrichment listener ──────────────────────────────
  App\EventListener\JwtCreatedListener:
    tags:
      - {
          name: kernel.event_listener,
          event: lexik_jwt_authentication.on_jwt_created,
          method: onJWTCreated,
        }

  # ── Instance ID request listener ─────────────────────────
  App\EventListener\InstanceRequestListener:
    tags:
      - {
          name: kernel.event_listener,
          event: kernel.request,
          method: onKernelRequest,
          priority: 20,
        }

  # ── Instance ID Doctrine listener ────────────────────────
  App\EventListener\InstanceDoctrineListener:
    tags:
      - { name: doctrine.event_listener, event: prePersist }

  # ── Rate-limit subscriber (DDoS / brute-force protection) ─
  App\EventSubscriber\RateLimitSubscriber:
    arguments:
      $apiLimiter: "@limiter.api"
      $apiSensitiveLimiter: "@limiter.api_sensitive"
    tags:
      - { name: kernel.event_subscriber }

  App\Service\NotificationGateway:
    arguments:
      $notificationServiceUrl: '%env(string:NOTIFICATION_SERVICE_URL)%'
      $internalNotificationToken: '%env(string:INTERNAL_NOTIFICATION_TOKEN)%'
